<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CricPro Elite | Fix Spin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/motion@10.16.2/dist/motion.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0c;
            color: #e5e7eb;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .font-syne {
            font-family: 'Syne', sans-serif;
        }

        .glass-card {
            background: #16161a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
        }

        /* 3D Coin - Reset-ready Logic */
        .coin-box {
            width: 85px;
            height: 85px;
            perspective: 1000px;
            margin: 0 auto;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .side {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .side.heads {
            background: linear-gradient(145deg, #fbbf24, #b45309);
            color: #451a03;
            border: 4px solid #f59e0b;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.4), 0 0 20px rgba(251, 191, 36, 0.2);
        }

        .side.tails {
            background: linear-gradient(145deg, #94a3b8, #334155);
            color: #f1f5f9;
            border: 4px solid #64748b;
            transform: rotateY(180deg);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.2), 0 0 20px rgba(148, 163, 184, 0.1);
        }

        .captain-active {
            border: 1px solid #fbbf24 !important;
            background: rgba(251, 191, 36, 0.05) !important;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="p-3 md:p-6 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-extrabold tracking-tighter font-syne">CRIC<span class="text-blue-500">PRO</span>
            </h1>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div class="space-y-4">
                <div class="glass-card p-5 shadow-2xl">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="font-bold text-xs uppercase tracking-widest text-gray-400">Squad Selection</h2>
                        <span id="pCount" class="text-xs font-bold text-blue-500">0 Players</span>
                    </div>

                    <div class="flex gap-2 mb-4">
                        <input type="text" id="pInput" placeholder="Name..."
                            class="flex-1 bg-black/40 border border-white/10 rounded-lg px-4 py-2.5 focus:outline-none focus:border-blue-500 text-sm">
                        <button onclick="addPlayer()"
                            class="bg-blue-600 px-5 rounded-lg font-bold text-sm active:scale-95">Add</button>
                    </div>

                    <div id="pList" class="grid grid-cols-1 gap-1.5 max-h-[220px] overflow-y-auto no-scrollbar"></div>

                    <button onclick="generateTeams()"
                        class="w-full mt-4 bg-white text-black py-3 rounded-xl font-black text-sm hover:bg-blue-600 hover:text-white transition-all shadow-xl active:scale-95 uppercase tracking-tight">
                        Build Battle Teams
                    </button>
                </div>

                <div class="glass-card p-4 flex items-center justify-between border-t-2 border-blue-500/20">
                    <div class="flex flex-col gap-2">
                        <h2 class="font-bold text-[10px] uppercase tracking-widest text-gray-500">Match Toss</h2>
                        <button onclick="flipCoin()" id="tBtn"
                            class="bg-blue-600/10 border border-blue-500/40 text-blue-400 px-5 py-2 rounded-full text-xs font-black active:scale-90 transition-all">FLIP
                            COIN</button>
                        <div id="tResult" class="text-xs font-black text-yellow-500 uppercase italic mt-1 h-4"></div>
                    </div>
                    <div class="coin-box">
                        <div class="coin" id="coin">
                            <div class="side heads">HEADS</div>
                            <div class="side tails">TAILS</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="resArea" class="hidden space-y-4">
                <div class="text-center md:text-left">
                    <h2 class="text-xl font-black text-white italic tracking-tighter uppercase">Matchup Ready</h2>
                </div>
                <div class="space-y-3">
                    <div class="glass-card p-4 border-l-4 border-blue-600">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xs font-bold uppercase text-blue-400">Team Lambda</h3>
                            <span id="t1Count" class="text-lg font-black text-blue-500">0</span>
                        </div>
                        <ul id="t1" class="space-y-1.5 text-xs text-gray-300"></ul>
                    </div>
                    <div class="glass-card p-4 border-l-4 border-amber-500">
                        <div class="flex items-center justify-between">
                            <h3 class="text-xs font-bold uppercase text-amber-500">Team Theta</h3>
                            <span id="t2Count" class="text-lg font-black text-amber-500">0</span>
                        </div>
                        <ul id="t2" class="space-y-1.5 text-xs text-gray-300"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let players = [
            { name: "Mudassir", isCaptain: false },
            { name: "Abdul Basit", isCaptain: false },
            { name: "Anas", isCaptain: false },
            { name: "Sohail", isCaptain: false },
            { name: "Naeem", isCaptain: false },
            { name: "Hussain", isCaptain: false },
            { name: "Wajahat", isCaptain: false },
            { name: "Mallahim", isCaptain: false },
            { name: "Ali", isCaptain: false },
            { name: "Waqar", isCaptain: false },
            { name: "Ahsan", isCaptain: false },
        ];

        const { animate, stagger } = Motion;

        window.onload = () => { render(); };

        function addPlayer() {
            const input = document.getElementById('pInput');
            if (input.value.trim()) {
                players.push({ name: input.value.trim(), isCaptain: false });
                input.value = '';
                render();
            }
        }

        function toggleCaptain(index) {
            const currentCaptains = players.filter(p => p.isCaptain).length;
            if (!players[index].isCaptain && currentCaptains >= 2) return;
            players[index].isCaptain = !players[index].isCaptain;
            render();
        }

        function removePlayer(index) {
            players.splice(index, 1);
            render();
        }

        function render() {
            const list = document.getElementById('pList');
            document.getElementById('pCount').innerText = `${players.length} Players`;
            list.innerHTML = '';
            players.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-2.5 rounded-lg bg-white/5 border border-white/5 ${p.isCaptain ? 'captain-active' : ''}`;
                div.innerHTML = `<div class="flex items-center gap-2"><button onclick="toggleCaptain(${i})" class="text-sm ${p.isCaptain ? '' : 'opacity-20 grayscale'}">🌟</button><span class="text-sm font-semibold ${p.isCaptain ? 'text-yellow-500' : 'text-gray-300'}">${p.name}</span></div><button onclick="removePlayer(${i})" class="text-gray-600 text-xs px-2">✕</button>`;
                list.appendChild(div);
            });
        }

        function generateTeams() {
            const caps = players.filter(p => p.isCaptain);
            if (caps.length !== 2) return alert("Select 2 Captains first (Tap Star)");
            let t1 = [caps[0].name], t2 = [caps[1].name];
            let pool = players.filter(p => !p.isCaptain).map(p => p.name).sort(() => Math.random() - 0.5);
            pool.forEach((n, i) => (i % 2 === 0 ? t1.push(n) : t2.push(n)));
            let t1Count = t1.length, t2Count = t2.length;
            document.getElementById('t1Count').innerText = t1Count;
            document.getElementById('t2Count').innerText = t2Count;
            document.getElementById('resArea').classList.remove('hidden');
            showList('t1', t1); showList('t2', t2);
            confetti({ particleCount: 100, spread: 60, origin: { y: 0.8 } });
            if (window.innerWidth < 768) setTimeout(() => document.getElementById('resArea').scrollIntoView({ behavior: 'smooth' }), 300);
        }

        function showList(id, arr) {
            const el = document.getElementById(id); el.innerHTML = '';
            arr.forEach((n, i) => {
                const li = document.createElement('li');
                li.className = 'p-2 rounded bg-black/20 flex justify-between items-center border border-white/5 mb-1';
                li.innerHTML = `<span>${n}</span> ${i === 0 ? '<span class="text-[7px] font-black text-yellow-500 bg-yellow-500/10 px-1.5 py-0.5 rounded border border-yellow-500/30">CAPTAIN</span>' : ''}`;
                el.appendChild(li);
            });
            animate(`#${id} li`, { opacity: [0, 1], x: [-10, 0] }, { delay: stagger(0.05) });
        }

        // --- FIXED RE-SPINNABLE COIN LOGIC ---
        let currentRotation = 0;
        function flipCoin() {
            const coin = document.getElementById('coin');
            const res = document.getElementById('tResult');
            const btn = document.getElementById('tBtn');

            btn.disabled = true;
            res.innerText = "SPINNING...";

            // Randomly pick heads (0) or tails (180)
            const isHeads = Math.random() < 0.5;

            // Increment the rotation instead of setting it to a fixed value
            // This ensures it ALWAYS spins from the last position
            currentRotation += 1800 + (isHeads ? (currentRotation % 360 === 0 ? 0 : 180) : (currentRotation % 360 === 0 ? 180 : 0));

            // Special fix: ensure we land exactly on 0 or 180 phase
            const finalTarget = Math.ceil(currentRotation / 180) * 180;
            currentRotation = isHeads ? (Math.round(finalTarget / 360) * 360) : (Math.round(finalTarget / 360) * 360 + 180);

            animate(coin,
                { transform: `rotateY(${currentRotation}deg)` },
                { duration: 2, easing: "ease-out" }
            ).finished.then(() => {
                res.innerText = isHeads ? "★ HEADS ★" : "★ TAILS ★";
                btn.disabled = false;
                confetti({ particleCount: 30, spread: 40, origin: { x: 0.8, y: 0.5 }, colors: [isHeads ? '#fbbf24' : '#94a3b8'] });
            });
        }

        document.getElementById('pInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addPlayer(); });
    </script>
</body>

</html>
